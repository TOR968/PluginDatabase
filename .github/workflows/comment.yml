name: Mass comment
on:
    workflow_dispatch:
        inputs:
            message:
                description: "Comment to post on all open issues"
                required: true

jobs:
    comment:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Comment on all open issues
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh issue list --state open --limit 1000 --json number --jq '.[].number' | \
                  jq '.[]' | \
                  while read num; do
                    gh issue comment "$num" --body "${{ github.event.inputs.message }}"
                  done
